<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Ex 6</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background-color: #f5f5f5;
            padding: 30px;
            width: 90%;
            margin: 50px auto;
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            width: 200px;
            height: 40px;
            line-height: 40px;
            margin: 5px;
            border: 2px solid #3498db;
            border-radius: 8px;
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #3498db;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Danh mục Sản phẩm Nổi bật</h2>

        <a href="#" class="btn">Laptop</a>
        <a href="#" class="btn">Điện Thoại</a>
        <a href="#" class="btn">Phụ Kiện Điện Tử</a>
        <a href="#" class="btn">Máy Tính Bảng</a>
        <a href="#" class="btn">Đồng Hồ Thông Minh</a>
    </div>

</body>

</html>
