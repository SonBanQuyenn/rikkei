<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 6</title>
    <style>
        .projects {
            width: 80%;
            margin: auto;
            }

        .project {
            display: flex;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            }

        .project-image img {
            width: 300px;
            border-radius: 8px;
            }

        .project-content {
            flex: 1;
            }

        .project.reverse {
            flex-direction: row-reverse;
            }
    </style>
</head>
<body>
    <section class="projects">
        <h2>Các Dự Án Nổi Bật</h2>
    
        <div class="project">
            <div class="project-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="">
            </div>
            <div class="project-content">
                <h3>Dự án Web App E-commerce</h3>
                <p>Hệ thống quản lý bán hàng toàn diện...</p>
            </div>
        </div>
    
        <div class="project reverse">
            <div class="project-image">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="">
            </div>
            <div class="project-content">
                <h3>Dự án Data Dashboard ERP</h3>
                <p>Bảng điều khiển phân tích dữ liệu trực quan...</p>
            </div>
        </div>
    </section>
</body>
</html>
