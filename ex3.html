<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            color: #fff;
            background: #000;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 24px;
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
        }

        .page::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        .page-content {
            position: relative;
            max-width: 920px;
        }

        .page-content h1 {
            font-size: clamp(2.8rem, 5vw, 5.2rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 1rem;
            text-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        .page-content p {
            font-size: 1.05rem;
            line-height: 1.6;
            max-width: 760px;
            margin: 0 auto;
            color: #f4f4f4;
            text-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <section class="page">
        <div class="page-content">
            <h1>Khám Phá Vẻ Đẹp Thiên Nhiên</h1>
            <p>Đắm mình vào những cảnh quan hùng vĩ, tận hưởng không khí trong lành và tạo nên những kỷ niệm khó quên tại những điểm đến tuyệt vời nhất.</p>
        </div>
    </section>
</body>
</html>
