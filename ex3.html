<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fef7e8;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2.5rem 1.8rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .menu-section {
            margin-bottom: 3.5rem;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #c0392b;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
            position: relative;
            padding-bottom: 0.6rem;
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 3px;
            background: #e67e22;
            border-radius: 2px;
        }

        .menu-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.8rem;
        }

        .menu-card {
            flex: 0 1 auto;
            width: 210px;
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 1rem 1rem 1.2rem;
            text-align: center;
        }

        .dish-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c3e2f;
            margin-bottom: 0.4rem;
        }

        .dish-price {
            font-size: 1.05rem;
            font-weight: 600;
            color: #e67e22;
            background: #fff0e0;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
        }

        @media (max-width: 480px) {
            .menu-card {
                width: 140px;
            }

            .card-img {
                height: 120px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="menu-section">
            <div class="section-title">Thực Đơn Của Chúng Tôi</div>
            <div class="menu-grid">
                <div class="menu-card">
                    <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="Salad rau củ">
                    <div class="card-info">
                        <div class="dish-name">Salad Rau Củ Tươi</div>
                        <div class="dish-price">45.000 VND</div>
                    </div>
                </div>
                <div class="menu-card">
                    <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="Cơm gạo lứt">
                    <div class="card-info">
                        <div class="dish-name">Cơm Gạo Lứt Bổ Dưỡng</div>
                        <div class="dish-price">75.000 VND</div>
                    </div>
                </div>
                <div class="menu-card">
                    <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="Pizza hải sản">
                    <div class="card-info">
                        <div class="dish-name">Pizza Hải Sản Phô Mai</div>
                        <div class="dish-price">120.000 VND</div>
                    </div>
                </div>
                <div class="menu-card">
                    <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="Hamburger bò">
                    <div class="card-info">
                        <div class="dish-name">Hamburger Bò Úc</div>
                        <div class="dish-price">85.000 VND</div>
                    </div>
                </div>
                <div class="menu-card">
                    <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQu75yQ7oHYDk7vpHD841TKK9U-NKOogVwp7A&s" alt="Sườn nướng">
                    <div class="card-info">
                        <div class="dish-name">Sườn Nướng BBQ</div>
                        <div class="dish-price">150.000 VND</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
