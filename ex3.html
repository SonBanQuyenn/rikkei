<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 3</title>
    <style>
        a {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgb(236, 171, 7);
            border: 2px solid black;
            text-decoration: none;
            font-weight: 600;
            border-radius: 6px;
        }

        .icon {
            font-size: 20px;
            vertical-align: middle;
            margin-right: 6px;
        }

        .text {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <a href="#">
        <span class="icon">🛒</span>
        <span class="text">Thêm vào giỏ hàng</span>
    </a>
</body>
</html>
