<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #0f3b5c;
            margin-bottom: 2.5rem;
            letter-spacing: -0.5px;
        }

        .services-row {
            display: flex;
            gap: 1.5rem;
        }

        .service-card {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            padding: 2rem 1rem;
            border-radius: 1.5rem;
            text-align: center;
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
            transition: all 0.25s ease;
            flex-grow: 1;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -8px rgba(37, 99, 235, 0.4);
        }

        @media (max-width: 650px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1.5rem;
            }

            .section-title {
                font-size: 1.7rem;
            }

            .service-card {
                font-size: 1.1rem;
                padding: 1.3rem 0.5rem;
            }

            .services-row {
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .services-row {
                flex-direction: column;
                gap: 1rem;
            }

            .service-card {
                flex-grow: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="section-title">Dịch Vụ Của Chúng Tôi</div>
        <div class="services-row">
            <div class="service-card">Web Design</div>
            <div class="service-card">SEO</div>
            <div class="service-card">Content</div>
        </div>
    </div>
</body>

</html>
