<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Ex 5</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        .popup {
            width: 600px;
            margin: 100px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .popup h2 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .popup p {
            color: #555;
            margin-bottom: 20px;
        }

        .form {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        input[type="email"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="popup">
            <h2>Đăng ký nhận khuyến mãi!</h2>
            <p>Nhập email của bạn để không bỏ lỡ những deal mới nhất.</p>

            <div class="form">
                <input type="email" placeholder="Nhập địa chỉ email...">
                <button>Đăng ký ngay</button>
            </div>
        </div>
    </div>

</body>

</html>
