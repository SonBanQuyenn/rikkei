<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 5</title>
    <style>
        .footer {
            display: flex;
            justify-content: space-between; 
            align-items: center;

            background-color: #2f3e4e;
            color: white;
            padding: 15px 30px;
            }

        .footer-right a {
            color: white;
            text-decoration: none;
            margin-left: 20px; 
            }

        .footer-right a:hover {
            text-decoration: underline;
            }
    </style>
</head>
<body>
    <footer class="footer">
        <div class="footer-left">
            © 2026 Bản quyền thuộc về Bạn.
        </div>
    
        <div class="footer-right">
            <a href="#">Facebook</a>
            <a href="#">Twitter</a>
            <a href="#">LinkedIn</a>
            <a href="#">Instagram</a>
        </div>
    </footer>
</body>
</html>
