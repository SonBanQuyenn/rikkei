<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex 7</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            }

        .pricing {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            height: 400px;
            }

        .card {
            background: white;
            padding: 25px;
            width: 200px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            }

        .card h2 {
            margin: 10px 0;
            }

        .card p {
            font-size: 14px;
            color: #555;
            margin: 5px 0;
            }

        .card button {
            margin-top: 15px;
            padding: 8px 12px;
            border: none;
            background: #2d3e50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            }

        .highlight {
            background: linear-gradient(135deg, #1e90ff, #0066ff);
            color: white;
            transform: scale(1.05);
            align-self: flex-start;
            }

        .highlight p {
            color: #e0eaff;
            }

        .highlight button {
            background: white;
            color: #0066ff;
            }
    </style>
</head>
<body>
    <div class="pricing">
        <div class="card">
            <h3>Cơ bản</h3>
            <h2>Miễn phí</h2>
            <p>1 Dự án</p>
            <p>100MB Lưu trữ</p>
            <p>Hỗ trợ Email</p>
            <button>Bắt đầu ngay</button>
        </div>
    
        <div class="card highlight">
            <h3>Chuyên nghiệp</h3>
            <h2>99.000đ/th</h2>
            <p>Dự án Không Giới Hạn</p>
            <p>10GB Lưu trữ</p>
            <p>Hỗ trợ 24/7</p>
            <p>Domain Tùy chỉnh</p>
            <button>Nâng cấp</button>
        </div>
    
        <div class="card">
            <h3>Doanh nghiệp</h3>
            <h2>Liên hệ</h2>
            <p>Gói tùy chỉnh đầy đủ</p>
            <p>Dung lượng cao nhất</p>
            <p>Tư vấn riêng biệt</p>
            <button>Tìm hiểu thêm</button>
        </div>
    </div>
</body>
</html>
