<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Ex 8</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
        }

        .logo {
            float: left;
            font-size: 20px;
            font-weight: bold;
        }

        .nav {
            float: right;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .clearfix {
            clear: both;
        }

        .content {
            padding: 30px 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="logo">TechZone</div>

        <div class="nav">
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </div>

        <div class="clearfix"></div>
    </div>

    <div class="content">
        <h2>Chào mừng bạn đến với TechZone!</h2>
        <p>Đây là nội dung trang web không bị tràn lên phần Header phía trên nhờ kỹ thuật clear float.</p>
    </div>

</body>

</html>
